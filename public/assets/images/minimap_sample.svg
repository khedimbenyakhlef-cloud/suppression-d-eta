<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#050b14"/>
  <!-- Buildings -->
  <rect x="20" y="20" width="60" height="50" fill="#1a3a5c" stroke="#00e5ff" stroke-width="0.5"/>
  <rect x="90" y="20" width="80" height="50" fill="#1a3a5c" stroke="#00e5ff" stroke-width="0.5"/>
  <rect x="180" y="20" width="100" height="50" fill="#1a3a5c" stroke="#00e5ff" stroke-width="0.5"/>
  <rect x="20" y="90" width="60" height="80" fill="#1a3a5c" stroke="#00e5ff" stroke-width="0.5"/>
  <rect x="90" y="90" width="80" height="80" fill="#0d1f35" stroke="#ff6b00" stroke-width="1.5"/>
  <rect x="180" y="90" width="100" height="80" fill="#1a3a5c" stroke="#00e5ff" stroke-width="0.5"/>
  <!-- Roads -->
  <rect x="0" y="78" width="300" height="6" fill="#0d1a26"/>
  <rect x="0" y="176" width="300" height="6" fill="#0d1a26"/>
  <rect x="78" y="0" width="6" height="300" fill="#0d1a26"/>
  <rect x="174" y="0" width="6" height="300" fill="#0d1a26"/>
  <!-- Player marker -->
  <circle cx="130" cy="130" r="6" fill="#00e5ff" opacity="0.9"/>
  <circle cx="130" cy="130" r="10" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
  <!-- Enemy markers -->
  <circle cx="60" cy="60" r="3" fill="#ff1744"/>
  <circle cx="220" cy="60" r="3" fill="#ff1744"/>
  <circle cx="60" cy="220" r="3" fill="#ff4500"/>
  <circle cx="220" cy="220" r="3" fill="#ff4500"/>
  <!-- Objective marker -->
  <polygon points="130,30 137,50 157,50 141,62 148,82 130,70 112,82 119,62 103,50 123,50" fill="#ffea00" opacity="0.8"/>
</svg>